<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mObywatel</title>
    
    <link rel="icon" type="image/png" href="../main/dowod_files/orzelek.png">
    <link rel="stylesheet" href="../main/css/main.css">
    
    <script src="../main/js/tech.js" defer></script>
    <script src="../main/js/anim.js" defer></script>
    <script src="../main/js/opt.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f5f6fb] h-[100dvh] flex justify-center overflow-hidden">
    <div id="app-container" class="w-full h-full flex justify-center"></div>

    <script>
        (function() {
            const userDataRaw = sessionStorage.getItem('userData');
            const userLogin = sessionStorage.getItem('userLogin');

            if (!userDataRaw || !userLogin) {
                // Powrót do index.html (jeden poziom w górę)
                window.location.href = '../index.html'; 
                return;
            }

            const userData = JSON.parse(userDataRaw);

            window.PERSON_DATA = {
                ...userData,
                name: userData.name || userData.imie, 
                    surname: userData.surname || userData.nazwisko,
                    photo: `../${userLogin}/image.png`
            };
        })();
    </script>
</body>
</html>
