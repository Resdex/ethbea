<style>
    html, body { 
        height: 100%; 
        margin: 0; 
        overflow: hidden; 
        background-color: #f5f6fb; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #selection-view { display: none !important; }
    .active-selection #main-view { display: none !important; }
    .active-selection #selection-view { display: flex !important; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .doc-icon {
        width: 48px; height: 32px; border-radius: 6px; flex-shrink: 0;
        position: relative; overflow: hidden;
    }
    .doc-icon::after {
        content: ''; position: absolute; top: 4px; left: 4px;
        width: 4px; height: 4px; background: rgba(255,255,255,0.5); border-radius: 50%;
    }

    .btn-active {
        background-color: #165ef8 !important;
        color: white !important;
    }

    .fade-in-quick { animation: fadeInQuick 0.2s ease-out; }
    @keyframes fadeInQuick {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div id="m-container" class="w-full max-w-[400px] mx-auto flex flex-col h-[100dvh] overflow-hidden bg-[#f5f6fb] relative">
    
    <div id="main-view" class="flex flex-col h-full fade-in-quick">

                    </div>
                    <div class="flex items-center gap-4">

                        </div>

                            <span class="text-[15px] font-bold uppercase leading-none">{{name}}</span>

            <div class="mt-auto pt-4 mb-2 flex justify-end">
                <div onclick="document.getElementById('m-container').classList.add('active-selection')" 
                     class="bg-white px-5 py-3 rounded-full shadow-lg border border-gray-100 flex items-center gap-2 active:scale-95 cursor-pointer">

    </div>

<script>
    const checkboxes = document.querySelectorAll('.doc-checkbox');
    const addBtn = document.getElementById('add-btn');

    checkboxes.forEach(cb => {
        cb.addEventListener('change', () => {
            const anyChecked = Array.from(checkboxes).some(c => c.checked);
            if (anyChecked) {
                addBtn.classList.add('btn-active');
            } else {
                addBtn.classList.remove('btn-active');
            }
        });
    });
</script>
